<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}" data-page="{{ .Kind }}">
{{ partial "head.html" . }}
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="grain" aria-hidden="true"></div>

  {{ partial "header.html" . }}

  <main id="main" class="wrap">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <script src="{{ "js/cv.js" | relURL }}" defer></script>
</body>
</html>
